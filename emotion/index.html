<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时表情识别系统</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-top: 20px;
        }

        .video-section {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .result-card h3 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .emotion-display {
            text-align: center;
            padding: 30px 0;
        }

        .emotion-icon {
            font-size: 5rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .emotion-text {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }

        .emotion-confidence {
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .emotion-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .emotion-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .emotion-label {
            width: 60px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .bar-container {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .bar-value {
            width: 45px;
            text-align: right;
            font-size: 0.85rem;
            color: #aaa;
        }

        .neutral { background: linear-gradient(90deg, #74b9ff, #0984e3); }
        .happy { background: linear-gradient(90deg, #fdcb6e, #f39c12); }
        .sad { background: linear-gradient(90deg, #74b9ff, #636e72); }
        .angry { background: linear-gradient(90deg, #ff7675, #d63031); }
        .fearful { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }
        .disgusted { background: linear-gradient(90deg, #00b894, #00cec9); }
        .surprised { background: linear-gradient(90deg, #fd79a8, #e84393); }

        .status-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            color: #fff;
            font-weight: 600;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #fff;
        }

        .loading-subtext {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">正在加载表情识别模型...</div>
        <div class="loading-subtext">首次加载可能需要一些时间，请耐心等待</div>
    </div>

    <div class="container">
        <header>
            <h1>🎭 实时表情识别系统</h1>
            <p>基于 AI 的人脸表情实时检测与分析</p>
        </header>

        <div class="main-content">
            <div class="video-section">
                <div class="video-container">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="overlay"></canvas>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="startBtn">开启摄像头</button>
                    <button class="btn btn-secondary" id="stopBtn" disabled>关闭摄像头</button>
                </div>
            </div>

            <div class="results-section">
                <div class="result-card">
                    <h3>😊 当前表情</h3>
                    <div class="emotion-display">
                        <div class="emotion-icon" id="emotionIcon">😐</div>
                        <div class="emotion-text" id="emotionText">等待检测...</div>
                        <div class="emotion-confidence" id="emotionConfidence">置信度: 0%</div>
                    </div>
                </div>

                <div class="result-card">
                    <h3>📊 表情概率分布</h3>
                    <div class="emotion-bars" id="emotionBars">
                        <div class="emotion-bar">
                            <span class="emotion-label">平静</span>
                            <div class="bar-container">
                                <div class="bar-fill neutral" id="bar-neutral" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-neutral">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">开心</span>
                            <div class="bar-container">
                                <div class="bar-fill happy" id="bar-happy" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-happy">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">悲伤</span>
                            <div class="bar-container">
                                <div class="bar-fill sad" id="bar-sad" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-sad">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">愤怒</span>
                            <div class="bar-container">
                                <div class="bar-fill angry" id="bar-angry" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-angry">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">惊讶</span>
                            <div class="bar-container">
                                <div class="bar-fill surprised" id="bar-surprised" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-surprised">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">恐惧</span>
                            <div class="bar-container">
                                <div class="bar-fill fearful" id="bar-fearful" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-fearful">0%</span>
                        </div>
                        <div class="emotion-bar">
                            <span class="emotion-label">厌恶</span>
                            <div class="bar-container">
                                <div class="bar-fill disgusted" id="bar-disgusted" style="width: 0%"></div>
                            </div>
                            <span class="bar-value" id="val-disgusted">0%</span>
                        </div>
                    </div>
                </div>

                <div class="status-panel">
                    <div class="status-item">
                        <span class="status-label">检测状态</span>
                        <span class="status-value" id="detectStatus">未开始</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">人脸数量</span>
                        <span class="status-value" id="faceCount">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">帧率</span>
                        <span class="status-value" id="fps">0 FPS</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">模型类型</span>
                        <span class="status-value" id="modelType">预训练模型</span>
                    </div>
                </div>

                <div style="margin-top: 20px; text-align: center;">
                    <a href="train.html" class="btn btn-secondary">🧠 训练自己的模型</a>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
